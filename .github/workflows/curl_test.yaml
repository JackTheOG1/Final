name: Build-Curl

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  build-test-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: build docker image
        run: |
          docker build -t sbom-test-base .

      - name: generate sbom
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock anchore/syft sbom-test-base:latest -o json > sbom.json

      - name: upload sbom
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: docker_run
        run: |
          docker rm -f final-app || true
          docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=dev-secret-key-123 --name final-app sbom-test-base

      - name: curl_ftw
        run: |
          sleep 10
          curl -f http://localhost:8000/
  sbom-scan-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: get-code
        uses: actions/checkout@v4
      - name: sbom_gen_and_scan
        uses: ./.github/actions/sbom-scan
      - name: upload_sbom
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: project-sbom
          path: sbom.json
          compression-level: 0
      
